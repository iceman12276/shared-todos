services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shared_todos
      POSTGRES_PASSWORD: shared_todos
      POSTGRES_DB: shared_todos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shared_todos -d shared_todos"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

# template-source: ~/.claude/references/ci-template.yml
# Derived from the canonical CI template. The `template-drift-check` job
# below asserts the load-bearing invariants (semgrep ci mode, token wiring,
# gitleaks presence, SHA-pinned actions). If you intentionally diverge, add
# a `# template-exception: <reason>` comment explaining why.
name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  backend:
    name: backend (lint + type + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shared_todos
          POSTGRES_PASSWORD: shared_todos
          POSTGRES_DB: shared_todos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shared_todos -d shared_todos_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025
    env:
      DATABASE_URL: postgresql+psycopg://shared_todos:shared_todos@localhost:5432/shared_todos_test
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read .python-version
        id: python-version
        run: |
          if [ -f .python-version ]; then
            echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=3.12" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy --strict .

      - name: Run migrations against real Postgres
        run: uv run alembic upgrade head

      - name: Test (pytest, real services)
        run: uv run pytest -v

  test-quality-gate:
    name: test-quality gate (no skipped/empty tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Disallow unconditional test skips
        shell: bash
        run: |
          set -euo pipefail
          if [ -d backend/tests ]; then
            if grep -RnE --include='*.py' \
                -e '^\s*@pytest\.mark\.skip(\s*\(|\s*$)' \
                -e '^\s*pytest\.skip\(' \
                backend/tests; then
              echo "::error::Unconditional pytest.mark.skip / pytest.skip found. Use skipif with a condition or delete the test."
              exit 1
            fi
          fi
          if [ -d frontend ]; then
            if grep -RnE --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
                -e '(^|\s)(xit|xdescribe|xtest)\(' \
                -e '(it|test|describe)\.skip\(' \
                frontend; then
              echo "::error::Unconditional test skip (xit/xdescribe/.skip) found. Use conditional skip or delete the test."
              exit 1
            fi
          fi
          echo "OK: no unconditional skips found."

      - name: Disallow empty test bodies (python)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d backend/tests ]; then
            if grep -RPzo --include='*.py' \
                '(?s)def test_[A-Za-z0-9_]+\([^)]*\)[^:]*:\s*(?:"""[^"]*"""\s*)?(?:pass|\.\.\.)\s*(?:#[^\n]*)?\n' \
                backend/tests | grep -q .; then
              echo "::error::Empty test body detected in backend/tests (def test_* with only pass/...). Write a real assertion or delete the test."
              exit 1
            fi
          fi
          echo "OK: no empty test bodies found."

      - name: Disallow type-escape hatches in tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -d backend/tests ]; then
            if grep -RnE --include='*.py' '^\s*#\s*type:\s*ignore' backend/tests; then
              echo "::error::'# type: ignore' in test files. Tests must exercise the real typed surface."
              exit 1
            fi
          fi
          if [ -d frontend ]; then
            found_any=0
            while IFS= read -r -d '' d; do
              if grep -RnE --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
                  'as[[:space:]]+any\b' "$d"; then
                found_any=1
              fi
            done < <(find frontend -type d \( -name tests -o -name __tests__ \) -print0)
            if [ "$found_any" -eq 1 ]; then
              echo "::error::'as any' in frontend test files. Tests must exercise the real typed surface."
              exit 1
            fi
          fi
          echo "OK: no type escape hatches in test files."

  security-gate:
    name: security gate (semgrep + gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python (for semgrep)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install semgrep
        run: pip install semgrep

      # Semgrep CI mode — uploads findings to Semgrep App dashboard for history +
      # policy enforcement. Matches canonical ~/.claude/references/ci-template.yml.
      # SEMGREP_APP_TOKEN is a repo-level GitHub secret; rule policy is configured
      # in the Semgrep App. Project-local rules under backend/semgrep-rules/ are
      # picked up automatically. Fixture dir excluded via .semgrepignore at repo root.
      - name: Semgrep CI (SAST + supply-chain + project-local rules)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: semgrep ci

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  template-drift-check:
    # Guards against post-authorship drift from the canonical CI template
    # at ~/.claude/references/ci-template.yml. Pairs with the authorship-time
    # hook at ~/.claude/hooks/ci-template-guard.py. Greps this file for the
    # load-bearing invariants that caused PR-1 pain when they were missing.
    name: ci template drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Assert ci.yml matches canonical template essentials
        shell: bash
        run: |
          set -euo pipefail
          WORKFLOW=.github/workflows/ci.yml
          fail() { echo "::error file=$WORKFLOW::drift-check: $1"; exit 1; }

          # Invariant 1 — Semgrep must use cloud-integrated 'semgrep ci' mode.
          # Offline 'semgrep scan' succeeds locally but uploads nothing to the
          # Semgrep App dashboard. PR-1 shipped with 'semgrep scan' and the
          # dashboard had zero full-repo scan history until diagnosed.
          if grep -qE '^\s*run:.*\bsemgrep scan\b' "$WORKFLOW"; then
            fail "Found 'semgrep scan' — use 'semgrep ci' (cloud-integrated) per canonical template."
          fi
          if ! grep -qE '^\s*run:.*\bsemgrep ci\b' "$WORKFLOW"; then
            fail "Semgrep step must invoke 'semgrep ci' — not found in any run: line."
          fi

          # Invariant 2 — SEMGREP_APP_TOKEN must be wired to the semgrep step.
          # Without it, 'semgrep ci' falls back to offline mode with a warning
          # that's easy to miss in CI logs.
          if ! grep -q 'SEMGREP_APP_TOKEN' "$WORKFLOW"; then
            fail "SEMGREP_APP_TOKEN must be referenced (env for semgrep step)."
          fi

          # Invariant 3 — Gitleaks secret scan must be present.
          # Separate from Semgrep's secret rules; catches different patterns.
          if ! grep -q 'gitleaks/gitleaks-action' "$WORKFLOW"; then
            fail "Gitleaks action must be present in security gate."
          fi

          # Invariant 4 — All 'uses:' refs must be 40-char SHA-pinned, not
          # version tags. Tags are mutable — an attacker compromising the
          # action's tag could inject code. SHAs are immutable.
          drift_found=0
          while IFS= read -r line; do
            # Extract the ref after @. Strip comments and whitespace.
            ref=$(printf '%s\n' "$line" | sed -E 's/.*@([^ #]+).*/\1/')
            if ! printf '%s' "$ref" | grep -qE '^[a-f0-9]{40}$'; then
              echo "::error file=$WORKFLOW::Unpinned action: $line (ref='$ref') — must be 40-char SHA."
              drift_found=1
            fi
          done < <(grep -E '^\s*(-\s+)?uses:\s+[^ ]+@' "$WORKFLOW")
          if [ "$drift_found" -eq 1 ]; then
            fail "One or more actions are not SHA-pinned. See errors above."
          fi

          echo "OK: ci.yml aligns with canonical template essentials."
